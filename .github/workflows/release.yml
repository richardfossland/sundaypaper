# Build, (optionally sign,) and publish SundayPaper for macOS + Windows on a
# version tag. Mirrors SundayStage's / SundayEdit's release flow.
#
# Cut a release:   npm version <patch|minor|major>   (bumps package.json)
#                  # bump src-tauri/tauri.conf.json "version" to match
#                  git tag vX.Y.Z && git push origin vX.Y.Z
#
# The tag push triggers this workflow, which produces a DRAFT GitHub Release
# with the installers + the updater `latest.json`. Review the draft, then
# publish it — installed apps pick up the update from the `latest` release
# endpoint configured in tauri.conf.json.
#
# Secrets: TAURI_SIGNING_PRIVATE_KEY(+_PASSWORD) are required (updater
# artifacts). The APPLE_* secrets are optional — without them the macOS build
# is unsigned (fine for internal testing; Gatekeeper needs a right-click→Open).
# See docs/DISTRIBUTION.md.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is Apple Silicon (arm64). Universal/Intel is a
          # follow-up (needs a universal target + matching deps).
          - platform: macos-latest
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (src-tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Updater signing (required for updater artifacts) ─────────────
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── macOS code signing + notarization ───────────────────────────
          # Disabled until the Apple secrets exist: an *empty* APPLE_CERTIFICATE
          # makes tauri-action run `security import` and FAIL the macOS job. With
          # these omitted the mac build is simply unsigned (right-click → Open the
          # first time). Re-enable by adding the secrets + uncommenting.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SundayPaper ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install. This is an early testing build — the macOS app may be unsigned (right-click → Open the first time)."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
