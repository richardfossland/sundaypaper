<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#A56A33"></stop><stop offset="1" stop-color="#4A2A12"></stop></linearGradient>
    <radialGradient id="glow" cx="0.26" cy="0.2" r="0.95"><stop offset="0" stop-color="#ffffff" stop-opacity="0.12"></stop><stop offset="0.55" stop-color="#ffffff" stop-opacity="0"></stop></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F2D58A"></stop><stop offset="1" stop-color="#EBB84B"></stop></linearGradient>
    <clipPath id="clip"><rect width="1024" height="1024" rx="228"></rect></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#bg)"></rect>
    <rect width="1024" height="1024" fill="url(#glow)"></rect>
    <!-- Document page — thin gold outline -->
    <rect x="300" y="236" width="424" height="556" rx="44" fill="none" stroke="#EBB84B" stroke-width="20"></rect>
    <!-- Cross masthead (canonical proportions, scaled) -->
    <rect x="497.0" y="300.0" width="30.0" height="196.5" rx="4.0" fill="url(#gold)"></rect>
    <rect x="449.6" y="354.24" width="124.8" height="30.0" rx="4.0" fill="url(#gold)"></rect>
    <!-- Body text lines -->
    <line x1="360" y1="566" x2="664" y2="566" stroke="#EBB84B" stroke-width="16" stroke-linecap="round"></line>
    <line x1="360" y1="624" x2="664" y2="624" stroke="#EBB84B" stroke-width="16" stroke-linecap="round" opacity="0.85"></line>
    <line x1="360" y1="682" x2="556" y2="682" stroke="#F2D58A" stroke-width="16" stroke-linecap="round" opacity="0.85"></line>
  </g>
</svg>
